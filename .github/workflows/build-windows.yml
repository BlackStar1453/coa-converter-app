name: Build Windows Executable

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout coa-converter-app
        uses: actions/checkout@v4

      - name: Checkout coa-converter backend
        uses: actions/checkout@v4
        with:
          repository: BlackStar1453/coa-converter
          path: coa-converter

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
          pip install pdfplumber openpyxl PyMuPDF python-docx

      - name: Build with PyInstaller
        run: |
          pyinstaller --noconfirm "COA Converter Windows.spec"

      - name: Verify build output
        run: |
          if (Test-Path "dist\COA Converter\COA Converter.exe") {
            Write-Host "Build successful!" -ForegroundColor Green
            Get-ChildItem "dist\COA Converter" | Format-Table Name, Length
          } else {
            Write-Host "Build FAILED - exe not found" -ForegroundColor Red
            exit 1
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: COA-Converter-Windows
          path: dist/COA Converter/
          retention-days: 30

      - name: Create Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/COA Converter/**
          generate_release_notes: true
